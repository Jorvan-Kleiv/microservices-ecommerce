<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Confirmation</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="width: 100%; background-color:#f4f4f4;padding:40px 0;">
    <tr>
        <td align="center" style="text-align: center;">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0;">

                <!-- Header -->
                <tr>
                    <td style="background-color:#1a1a2e;padding:28px 40px;">
                        <p style="margin:0;font-size:20px;font-weight:bold;color:#ffffff;letter-spacing:1px;">MyShop</p>
                    </td>
                </tr>

                <tr>
                    <td style="padding:40px;">

                        <p style="margin:0 0 6px 0;font-size:20px;font-weight:bold;color:#1a1a2e;">Payment Confirmed ✓</p>
                        <p style="margin:0 0 28px 0;font-size:14px;color:#555555;">
                            Hello <strong th:text="${toName}">John Doe</strong>, your payment has been received and confirmed.
                        </p>

                        <hr style="border:none;border-top:1px solid #eeeeee;margin:0 0 24px 0;"/>

                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="padding:11px 0;font-size:14px;color:#888888;border-bottom:1px solid #f0f0f0;width:45%;">Order Reference</td>
                                <td style="padding:11px 0;font-size:14px;color:#1a1a2e;font-weight:bold;border-bottom:1px solid #f0f0f0;" th:text="${reference}">ORD-2025-00847</td>
                            </tr>
                            <tr>
                                <td style="padding:11px 0;font-size:14px;color:#888888;border-bottom:1px solid #f0f0f0;">Amount Paid</td>
                                <td style="padding:11px 0;font-size:14px;color:#1a1a2e;font-weight:bold;border-bottom:1px solid #f0f0f0;">
                                    <span th:text="${amount}">125 000</span> XAF
                                </td>
                            </tr>
                            <tr>
                                <td style="padding:11px 0;font-size:14px;color:#888888;">Status</td>
                                <td style="padding:11px 0;">
                                    <span style="background-color:#e8f5e9;color:#2e7d32;font-size:12px;font-weight:bold;padding:4px 12px;border-radius:20px;">PAID</span>
                                </td>
                            </tr>
                        </table>

                        <hr style="border:none;border-top:1px solid #eeeeee;margin:24px 0;"/>

                        <p style="margin:0;font-size:13px;color:#777777;line-height:1.7;">
                            Thank you for your purchase. If you have any questions, please contact our support team.
                        </p>

                    </td>
                </tr>

                <tr>
                    <td style="background-color:#f9f9f9;padding:20px 40px;text-align:center;border-top:1px solid #eeeeee;">
                        <p style="margin:0;font-size:12px;color:#aaaaaa;">
                            © 2026 MyShop &nbsp;·&nbsp;
                            <a href="#" style="color:#aaaaaa;text-decoration:none;">Unsubscribe</a>
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
